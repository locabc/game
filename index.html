<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Lật Thẻ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            font-family: Arial, sans-serif;
        }

        .game-container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .card {
            width: 100%;
            aspect-ratio: 1/1;
            perspective: 1000px;
            cursor: pointer;
            position: relative;
            border-radius: 10px;
            transition: opacity 0.5s ease;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched {
            opacity: 0;
            pointer-events: none;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 3s; /* Tăng thời gian lật từ 0.6s lên 1.2s */
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-front {
            background: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card-back {
            background: #ff6b6b;
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease; /* Tăng thời gian hiển thị ảnh từ 0.3s lên 0.6s */
        }

        .card.flipped .card-back img {
            opacity: 1;
        }

        .score {
            margin-top: 20px;
            color: #fff;
            font-size: 1.5em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2em;
            background: #ff6b6b;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .restart-btn:hover {
            background: #ff8e53;
        }

        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                padding: 15px;
            }

            h1 {
                font-size: 2em;
            }

            .score {
                font-size: 1.2em;
            }
        }

        @media (max-width: 400px) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Trò Chơi Lật Thẻ</h1>
        <button class="restart-btn" onclick="restartGame()">Chơi Lại</button>
        <div class="game-board" id="gameBoard"></div>
        <div class="score">Lượt lật: <span id="moveCount">0</span></div>
    </div>

    <script>
        // Danh sách 8 ảnh từ thư mục gốc
        const images = [
            './image1.JPG',
            './image2.JPG',
            './image3.JPG',
            './image4.JPG',
            './image5.JPG',
            './image6.JPG',
            './image7.JPG',
            './image8.JPG'
        ];

        let cards = [...images, ...images]; // Nhân đôi để tạo cặp
        let flippedCards = [];
        let matchedCards = [];
        let moves = 0;
        let isLocked = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            shuffle(cards);
            cards.forEach((imgSrc, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.imgSrc = imgSrc;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"></div>
                        <div class="card-back"><img src="${imgSrc}" alt="Card Image"></div>
                    </div>
                `;
                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
            });
        }

        function flipCard(card) {
            if (isLocked || card.classList.contains('flipped') || card.classList.contains('matched')) {
                return;
            }

            card.classList.add('flipped');
            flippedCards.push(card);
            moves++;
            document.getElementById('moveCount').textContent = moves;

            if (flippedCards.length === 2) {
                isLocked = true;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.imgSrc === card2.dataset.imgSrc) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedCards.push(card1, card2);
                    flippedCards = [];
                    isLocked = false;
                    if (matchedCards.length === cards.length) {
                        setTimeout(() => alert('Chúc mừng! Bạn đã thắng với ' + moves + ' lượt lật!'), 1200); // Điều chỉnh thời gian chờ thông báo
                    }
                }, 3000); // Đợi 2 giây để xem trước khi ẩn
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 3000); // Đợi 3 giây để xem trước khi úp lại
            }
        }

        function restartGame() {
            flippedCards = [];
            matchedCards = [];
            moves = 0;
            document.getElementById('moveCount').textContent = moves;
            createBoard();
        }

        // Khởi tạo trò chơi
        createBoard();
    </script>
</body>
</html>
