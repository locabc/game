<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Lật Thẻ Ký Ức</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CÀI ĐẶT BIẾN VÀ RESET CSS --- */
        :root {
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --primary-color: #4299e1;
            --text-color: #e2e8f0;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --border-radius: 12px;
            --card-size: 120px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        /* --- CONTAINER CHÍNH CỦA GAME --- */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px var(--shadow-color);
        }

        /* --- KHU VỰC THÔNG SỐ GAME --- */
        .stats-container {
            display: flex;
            gap: 30px;
            background-color: var(--card-bg);
            padding: 10px 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px var(--shadow-color);
            font-size: 1.2rem;
        }

        .stat {
            font-weight: 600;
        }

        .stat span {
            color: var(--primary-color);
        }

        /* --- BẢNG CHƠI GAME --- */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            perspective: 1000px; /* Thêm perspective để có hiệu ứng 3D */
        }

        /* --- THẺ BÀI --- */
        .card {
            width: var(--card-size);
            height: var(--card-size);
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            border-radius: var(--border-radius);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }
        
        /* Chặn click khi thẻ đã khớp hoặc đang chờ xử lý */
        .card.matched, .board-locked .card:not(.flipped) {
            pointer-events: none;
        }
        
        .card.matched {
            opacity: 0.5; /* Làm mờ thẻ đã khớp */
        }


        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Ẩn mặt sau khi không quay mặt */
            border-radius: var(--border-radius);
            box-shadow: 0 4px 8px var(--shadow-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, #4a5568, #2d3748);
            font-size: 4rem;
            color: var(--primary-color);
        }

        .card-back {
            background-color: var(--card-bg);
            transform: rotateY(180deg);
        }

        .card-back img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        /* --- NÚT BẤM VÀ POPUP --- */
        .reset-button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background-color: var(--primary-color);
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(66, 153, 225, 0.4);
        }

        .reset-button:hover {
            background-color: #2b6cb0;
        }
        
        .reset-button:active {
            transform: scale(0.98);
        }

        .win-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        
        .win-popup.show {
            opacity: 1;
            pointer-events: auto;
        }

        .popup-content {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.4s ease;
        }
        
        .win-popup.show .popup-content {
            transform: scale(1);
        }

        .popup-content h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .popup-content p {
            margin-bottom: 25px;
            font-size: 1.2rem;
        }
        
        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            :root {
                --card-size: 90px;
            }
            h1 {
                font-size: 2rem;
            }
            .stats-container {
                font-size: 1rem;
                gap: 20px;
            }
        }
        
        @media (max-width: 480px) {
            :root {
                --card-size: 70px;
            }
             .game-board {
                gap: 10px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }

    </style>
</head>
<body>

    <div class="game-container">
        <h1>Lật Thẻ Ký Ức</h1>
        <div class="stats-container">
            <div class="stat">Số lần lật: <span id="moves-count">0</span></div>
        </div>
        <div class="game-board" id="game-board">
            <!-- Các thẻ bài sẽ được tạo bằng JavaScript -->
        </div>
        <button class="reset-button" id="reset-btn">Chơi Lại</button>
    </div>
    
    <div class="win-popup" id="win-popup">
        <div class="popup-content">
            <h2>Chiến Thắng!</h2>
            <p>Bạn đã hoàn thành với <span id="final-moves"></span> lần lật.</p>
            <button class="reset-button" id="play-again-btn">Chơi Lại</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // =================================================================
            // === THAY ĐỔI TÊN ẢNH CỦA BẠN TẠI ĐÂY (KHÔNG CẦN ĐUÔI FILE) ===
            // Ví dụ: nếu bạn có ảnh 'cat.png', 'dog.png' thì điền ['cat', 'dog']
            // Đảm bảo bạn có đủ 6 cặp ảnh (tổng 12 ảnh) trong thư mục /images
            //==================================================================
            const imageNames = [
                'image1', 'image2', 'image5', 'image3', 'image4', 'image6'
            ];
            const imageExtension = 'JPG'; // Đổi đuôi file ảnh nếu cần (png, jpg, ...)

            // --- Lấy các phần tử DOM ---
            const gameBoard = document.getElementById('game-board');
            const movesCountSpan = document.getElementById('moves-count');
            const resetButton = document.getElementById('reset-btn');
            const winPopup = document.getElementById('win-popup');
            const finalMovesSpan = document.getElementById('final-moves');
            const playAgainButton = document.getElementById('play-again-btn');

            // --- Biến trạng thái game ---
            let hasFlippedCard = false;
            let lockBoard = false;
            let firstCard, secondCard;
            let moves = 0;
            let matchedPairs = 0;
            const totalPairs = imageNames.length;

            // --- Hàm xáo trộn mảng (Fisher-Yates shuffle) ---
            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            // --- Hàm tạo các thẻ bài ---
            function createBoard() {
                // Tạo mảng thẻ bài gấp đôi và xáo trộn
                const cardArray = [...imageNames, ...imageNames];
                shuffle(cardArray);
                
                gameBoard.innerHTML = ''; // Xóa bảng cũ

                cardArray.forEach(name => {
                    const card = document.createElement('div');
                    card.classList.add('card');
                    card.dataset.name = name; // Dùng data-attribute để so sánh

                    card.innerHTML = `
                        <div class="card-face card-front">?</div>
                        <div class="card-face card-back">
                            <img src="${name}.${imageExtension}" alt="Hình ảnh ${name}" onerror="this.onerror=null;this.src='https://placehold.co/100x100/2d3748/e2e8f0?text=Error';">
                        </div>
                    `;
                    
                    card.addEventListener('click', flipCard);
                    gameBoard.appendChild(card);
                });
            }

            // --- Hàm xử lý khi lật thẻ ---
            function flipCard() {
                if (lockBoard) return; // Nếu bảng đang khóa, không làm gì cả
                if (this === firstCard) return; // Nếu click lại thẻ đã lật, không làm gì cả

                this.classList.add('flipped');

                if (!hasFlippedCard) {
                    // Lật thẻ đầu tiên
                    hasFlippedCard = true;
                    firstCard = this;
                    return;
                }
                
                // Lật thẻ thứ hai
                secondCard = this;
                incrementMoves();
                checkForMatch();
            }
            
            // --- Hàm kiểm tra hai thẻ có khớp không ---
            function checkForMatch() {
                const isMatch = firstCard.dataset.name === secondCard.dataset.name;
                isMatch ? disableCards() : unflipCards();
            }

            // --- Hàm xử lý khi hai thẻ khớp nhau ---
            function disableCards() {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');
                
                matchedPairs++;
                
                if (matchedPairs === totalPairs) {
                    setTimeout(showWinPopup, 500);
                }

                resetBoardState();
            }

            // --- Hàm xử lý khi hai thẻ không khớp ---
            function unflipCards() {
                lockBoard = true; // Khóa bảng để người chơi không lật thêm thẻ
                gameBoard.classList.add('board-locked');

                setTimeout(() => {
                    firstCard.classList.remove('flipped');
                    secondCard.classList.remove('flipped');
                    
                    resetBoardState();
                }, 1200); // Chờ 1.2 giây rồi úp thẻ xuống
            }
            
            // --- Hàm đặt lại trạng thái bàn cờ sau mỗi lượt ---
            function resetBoardState() {
                [hasFlippedCard, lockBoard] = [false, false];
                [firstCard, secondCard] = [null, null];
                gameBoard.classList.remove('board-locked');
            }
            
            // --- Hàm tăng số lần lật ---
            function incrementMoves() {
                moves++;
                movesCountSpan.textContent = moves;
            }
            
            // --- Hàm hiển thị popup chiến thắng ---
            function showWinPopup() {
                finalMovesSpan.textContent = moves;
                winPopup.classList.add('show');
            }

            // --- Hàm khởi động lại game ---
            function restartGame() {
                moves = 0;
                matchedPairs = 0;
                movesCountSpan.textContent = moves;
                winPopup.classList.remove('show');
                
                resetBoardState();
                
                // Thêm hiệu ứng nhỏ khi reset
                gameBoard.style.transition = 'transform 0.5s';
                gameBoard.style.transform = 'scale(0.9)';
                
                setTimeout(() => {
                    createBoard();
                    gameBoard.style.transform = 'scale(1)';
                }, 500);
            }

            // --- Gắn sự kiện cho các nút ---
            resetButton.addEventListener('click', restartGame);
            playAgainButton.addEventListener('click', restartGame);

            // --- Khởi tạo game lần đầu ---
            createBoard();
        });
    </script>
</body>
</html>
